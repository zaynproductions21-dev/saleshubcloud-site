<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 32 32%27%3E%3Ccircle cx=%2716%27 cy=%2716%27 r=%2716%27 fill=%27%237C6FF7%27/%3E%3Ccircle cx=%2716%27 cy=%2716%27 r=%279%27 fill=%27%235BC4C0%27/%3E%3Ccircle cx=%2716%27 cy=%2716%27 r=%274%27 fill=%27white%27/%3E%3C/svg%3E">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Sales Hub Cloud</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --c-purple:#7C6FF7;--c-purple-light:#EDE9FE;--c-purple-mid:#A89CF8;--c-purple-dark:#5A4FD6;
  --c-teal:#5BC4C0;--c-teal-light:#E0F5F4;
  --c-coral:#F4967E;--c-coral-light:#FDE8E2;
  --c-green:#6DD8A0;--c-green-light:#DFFAEE;
  --c-amber:#F7B955;--c-amber-light:#FEF3DC;
  --c-bg:#FAF0F6;--c-bg2:#F3EFF9;--c-white:#FFFFFF;--c-surface:#FAFAFF;
  --c-border:#EAE4F5;--c-border2:#D8CEFB;
  --c-text:#1E1A3C;--c-text2:#5A5478;--c-text3:#9E99BE;
  --ff:'Plus Jakarta Sans',sans-serif;
  --shadow:0 1px 4px rgba(124,111,247,0.06),0 4px 20px rgba(124,111,247,0.06);
  --shadow-md:0 4px 12px rgba(124,111,247,0.1),0 16px 48px rgba(124,111,247,0.1);
}
html{scroll-behavior:smooth}
body{background:var(--c-bg);color:var(--c-text);font-family:var(--ff);font-size:16px;line-height:1.6;overflow-x:hidden;}
a{color:inherit;text-decoration:none;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(250,240,246,0.93);backdrop-filter:blur(14px);border-bottom:1px solid var(--c-border);}
.nav-inner{max-width:1160px;margin:0 auto;padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{font-size:1.1rem;font-weight:800;color:var(--c-text);letter-spacing:-0.03em;display:flex;align-items:center;gap:0.5rem;}
.nav-logo-mark{width:32px;height:32px;border-radius:9px;background:var(--c-purple);display:flex;align-items:center;justify-content:center;color:#fff;font-size:0.85rem;font-weight:800;}
.nav-links{display:flex;gap:0.25rem;list-style:none;}
.nav-links a{color:var(--c-text2);font-size:0.875rem;font-weight:500;padding:0.4rem 0.8rem;border-radius:8px;transition:background .15s,color .15s;}
.nav-links a:hover,.nav-links a.active{background:var(--c-purple-light);color:var(--c-purple);}
.nav-right{display:flex;align-items:center;gap:0.75rem;}
.btn-ghost{color:var(--c-text2);font-size:0.875rem;font-weight:500;padding:0.45rem 1rem;border-radius:8px;border:1px solid var(--c-border2);background:var(--c-white);font-family:var(--ff);cursor:pointer;transition:border-color .15s,color .15s;}
.btn-ghost:hover{border-color:var(--c-purple);color:var(--c-purple);}
.btn-nav{background:var(--c-purple);color:#fff;font-size:0.875rem;font-weight:700;padding:0.5rem 1.35rem;border-radius:9px;border:none;cursor:pointer;font-family:var(--ff);box-shadow:0 4px 14px rgba(124,111,247,0.35);transition:background .15s,transform .1s;display:inline-block;}
.btn-nav:hover{background:var(--c-purple-dark);transform:translateY(-1px);}

/* HERO */
.blog-hero{
  padding:8rem 2rem 4rem;
  background:linear-gradient(160deg,#F3EFF9 0%,#FAF0F6 60%,#EEF9F8 100%);
  position:relative;overflow:hidden;text-align:center;
}
.blog-hero::before{
  content:'';position:absolute;top:-200px;left:50%;transform:translateX(-50%);
  width:900px;height:600px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(124,111,247,0.1),transparent 70%);
  pointer-events:none;
}
.hero-tag{display:inline-flex;align-items:center;gap:0.5rem;background:var(--c-white);color:var(--c-purple);border:1px solid var(--c-border2);border-radius:100px;padding:0.35rem 1rem;font-size:0.8rem;font-weight:600;margin-bottom:1.5rem;box-shadow:var(--shadow);}
.hero-tag-dot{width:7px;height:7px;border-radius:50%;background:var(--c-teal);box-shadow:0 0 6px var(--c-teal);}
.blog-h1{font-size:clamp(2.5rem,5vw,4rem);font-weight:800;letter-spacing:-0.04em;line-height:1.05;margin-bottom:1rem;}
.blog-h1 em{font-style:normal;background:linear-gradient(135deg,var(--c-purple),var(--c-teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.blog-sub{font-size:1.05rem;color:var(--c-text2);max-width:500px;margin:0 auto 2rem;line-height:1.75;}

/* SEARCH */
.search-wrap{max-width:480px;margin:0 auto;position:relative;}
.search-input{
  width:100%;font-family:var(--ff);font-size:0.9rem;color:var(--c-text);
  background:var(--c-white);border:1.5px solid var(--c-border2);border-radius:12px;
  padding:0.8rem 1rem 0.8rem 2.75rem;outline:none;
  transition:border-color .15s,box-shadow .15s;
}
.search-input:focus{border-color:var(--c-purple);box-shadow:0 0 0 3px rgba(124,111,247,0.12);}
.search-icon{position:absolute;left:0.9rem;top:50%;transform:translateY(-50%);color:var(--c-text3);font-size:0.95rem;pointer-events:none;}

/* FILTER PILLS */
.filter-wrap{max-width:1160px;margin:0 auto;padding:2.5rem 2rem 0;display:flex;gap:0.5rem;flex-wrap:wrap;}
.filter-pill{
  padding:0.45rem 1rem;border-radius:100px;border:1px solid var(--c-border2);
  background:var(--c-white);font-family:var(--ff);font-size:0.8rem;font-weight:600;
  color:var(--c-text2);cursor:pointer;transition:all .15s;
}
.filter-pill:hover{border-color:var(--c-purple);color:var(--c-purple);}
.filter-pill.active{background:var(--c-purple);color:#fff;border-color:var(--c-purple);}

/* BLOG GRID */
.blog-body{max-width:1160px;margin:0 auto;padding:2rem 2rem 5rem;}

/* FEATURED POST */
.featured-post{
  background:var(--c-white);border:1px solid var(--c-border);border-radius:20px;
  overflow:hidden;display:grid;grid-template-columns:1fr 1fr;
  margin-bottom:2rem;transition:box-shadow .2s,transform .2s;
}
.featured-post:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
@media(max-width:760px){.featured-post{grid-template-columns:1fr;}}
.featured-img{
  min-height:280px;display:flex;align-items:center;justify-content:center;
  font-size:4rem;position:relative;overflow:hidden;
}
.featured-content{padding:2.5rem;}
.featured-badge{
  display:inline-flex;align-items:center;gap:0.35rem;
  background:var(--c-purple-light);color:var(--c-purple);
  border-radius:100px;padding:0.25rem 0.75rem;font-size:0.72rem;font-weight:700;
  letter-spacing:0.04em;margin-bottom:1rem;
}
.featured-badge.teal{background:var(--c-teal-light);color:var(--c-teal);}
.featured-badge.coral{background:var(--c-coral-light);color:var(--c-coral);}
.featured-badge.green{background:var(--c-green-light);color:var(--c-green);}
.featured-badge.amber{background:var(--c-amber-light);color:var(--c-amber);}
.featured-title{font-size:1.5rem;font-weight:800;letter-spacing:-0.03em;line-height:1.2;margin-bottom:0.75rem;}
.featured-excerpt{font-size:0.9rem;color:var(--c-text2);line-height:1.7;margin-bottom:1.5rem;}
.post-meta{display:flex;align-items:center;gap:1rem;font-size:0.78rem;color:var(--c-text3);}
.post-meta-author{display:flex;align-items:center;gap:0.4rem;font-weight:600;color:var(--c-text2);}
.author-avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.55rem;font-weight:800;}
.read-more{
  display:inline-flex;align-items:center;gap:0.4rem;
  color:var(--c-purple);font-size:0.85rem;font-weight:700;
  margin-top:1.25rem;transition:gap .15s;
}
.read-more:hover{gap:0.65rem;}

/* POSTS GRID */
.posts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem;}
@media(max-width:900px){.posts-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:580px){.posts-grid{grid-template-columns:1fr;}}

.post-card{
  background:var(--c-white);border:1px solid var(--c-border);border-radius:16px;
  overflow:hidden;transition:box-shadow .2s,transform .2s;display:flex;flex-direction:column;
}
.post-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
.post-img{
  height:160px;display:flex;align-items:center;justify-content:center;
  font-size:2.75rem;position:relative;overflow:hidden;
}
.post-body{padding:1.5rem;flex:1;display:flex;flex-direction:column;}
.post-cat{
  display:inline-flex;align-items:center;gap:0.3rem;
  border-radius:100px;padding:0.2rem 0.65rem;font-size:0.68rem;font-weight:700;
  letter-spacing:0.04em;margin-bottom:0.75rem;width:fit-content;
}
.post-title{font-size:1rem;font-weight:800;letter-spacing:-0.02em;line-height:1.3;margin-bottom:0.5rem;}
.post-excerpt{font-size:0.82rem;color:var(--c-text2);line-height:1.65;flex:1;margin-bottom:1rem;}
.post-
.post-date{font-size:0.75rem;color:var(--c-text3);}
.post-read-time{font-size:0.75rem;color:var(--c-text3);}

/* NO RESULTS */
.no-results{text-align:center;padding:4rem 2rem;color:var(--c-text3);}
.no-results-icon{font-size:2.5rem;margin-bottom:1rem;}

/* NEWSLETTER */
.newsletter{
  background:linear-gradient(135deg,var(--c-purple-light),var(--c-teal-light));
  border:1px solid var(--c-border2);border-radius:20px;
  padding:3rem;text-align:center;margin:3rem 0;
}
.newsletter h3{font-size:1.5rem;font-weight:800;letter-spacing:-0.02em;margin-bottom:0.5rem;}
.newsletter p{font-size:0.9rem;color:var(--c-text2);margin-bottom:1.5rem;}
.newsletter-form{display:flex;gap:0.75rem;max-width:420px;margin:0 auto;flex-wrap:wrap;justify-content:center;}
.newsletter-input{
  flex:1;min-width:220px;font-family:var(--ff);font-size:0.875rem;color:var(--c-text);
  background:var(--c-white);border:1.5px solid var(--c-border2);border-radius:9px;
  padding:0.7rem 1rem;outline:none;transition:border-color .15s;
}
.newsletter-input:focus{border-color:var(--c-purple);}
.newsletter-btn{
  background:var(--c-purple);color:#fff;font-family:var(--ff);font-size:0.875rem;font-weight:700;
  padding:0.7rem 1.5rem;border-radius:9px;border:none;cursor:pointer;
  box-shadow:0 4px 14px rgba(124,111,247,0.35);transition:background .15s;white-space:nowrap;
}
.newsletter-btn:hover{background:var(--c-purple-dark);}
.newsletter-note{font-size:0.75rem;color:var(--c-text3);margin-top:0.75rem;}

/* CTA STRIP */
.cta-strip{background:linear-gradient(135deg,var(--c-purple) 0%,#6058D8 50%,var(--c-teal) 100%);padding:4rem 2rem;text-align:center;}
.cta-strip h2{font-size:2rem;font-weight:800;letter-spacing:-0.03em;color:#fff;margin-bottom:0.75rem;}
.cta-strip p{color:rgba(255,255,255,0.75);font-size:0.95rem;margin-bottom:2rem;}
.btn-white{background:#fff;color:var(--c-purple);padding:0.8rem 2rem;border-radius:10px;font-size:0.9rem;font-weight:700;font-family:var(--ff);border:none;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.15);transition:transform .1s,box-shadow .15s;display:inline-flex;align-items:center;gap:0.5rem;}
.btn-white:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.18);}

/* FOOTER */








/* REVEAL */
.reveal{opacity:0;transform:translateY(16px);transition:opacity .6s ease,transform .6s ease;}
.reveal.visible{opacity:1;transform:translateY(0);}
.reveal-delay-1{transition-delay:.1s;}.reveal-delay-2{transition-delay:.2s;}.reveal-delay-3{transition-delay:.3s;}

/* BG GRADIENTS FOR POST IMAGES */
.bg-purple{background:linear-gradient(135deg,#EDE9FE,#D8CEFB);}
.bg-teal{background:linear-gradient(135deg,#E0F5F4,#B5E8E6);}
.bg-coral{background:linear-gradient(135deg,#FDE8E2,#F9C9BC);}
.bg-green{background:linear-gradient(135deg,#DFFAEE,#B8F0D3);}
.bg-amber{background:linear-gradient(135deg,#FEF3DC,#FDE4A4);}

@media(max-width:900px){.nav-links{display:none;}}

/* ── FOOTER FULL ── */
footer{background:var(--c-white);border-top:1px solid var(--c-border);padding:3rem 2rem 2rem;}
.footer-inner{max-width:1160px;margin:0 auto;}
.footer-top{display:grid;grid-template-columns:280px 1fr;gap:4rem;margin-bottom:2.5rem;}
@media(max-width:860px){.footer-top{grid-template-columns:1fr;gap:2rem;}}
.footer-logo-row{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.75rem;}
.footer-logo-mark{width:32px;height:32px;border-radius:9px;background:var(--c-purple);display:flex;align-items:center;justify-content:center;color:#fff;font-size:0.85rem;font-weight:800;flex-shrink:0;}
.footer-logo-text{font-size:1rem;font-weight:800;color:var(--c-text);letter-spacing:-0.02em;}
.footer-tagline{font-size:0.825rem;color:var(--c-text3);line-height:1.6;margin-bottom:1.25rem;}
.footer-social{display:flex;gap:0.5rem;flex-wrap:wrap;}
.social-btn{width:34px;height:34px;border-radius:8px;background:var(--c-bg2);border:1px solid var(--c-border);display:flex;align-items:center;justify-content:center;color:var(--c-text3);transition:background .15s,color .15s,border-color .15s;}
.social-btn:hover{background:var(--c-purple-light);color:var(--c-purple);border-color:var(--c-border2);}
.footer-nav-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:2rem;}
@media(max-width:580px){.footer-nav-cols{grid-template-columns:1fr 1fr;}}
.footer-col{display:flex;flex-direction:column;gap:0.5rem;}
.footer-col-title{font-size:0.72rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--c-text3);margin-bottom:0.25rem;}
.footer-col a{font-size:0.85rem;color:var(--c-text2);font-weight:500;transition:color .15s;}
.footer-col a:hover{color:var(--c-purple);}
.footer-bottom{border-top:1px solid var(--c-border);padding-top:1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
.footer-copy{font-size:0.78rem;color:var(--c-text3);}
.footer-payment{display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;}
.footer-payment-label{font-size:0.72rem;color:var(--c-text3);font-weight:600;letter-spacing:0.04em;text-transform:uppercase;margin-right:0.25rem;}
.payment-badge{display:inline-flex;align-items:center;justify-content:center;border-radius:5px;overflow:hidden;border:1px solid var(--c-border);background:var(--c-white);padding:2px 4px;height:26px;}
.stripe-badge{padding:3px 8px;background:#f6f9fc;}
.stripe-badge svg{height:16px;width:auto;}


.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;white-space:nowrap;flex-shrink:0;}
.nav-logo-text{font-size:1rem;font-weight:800;color:#1E1A3C;letter-spacing:-0.02em;white-space:nowrap;}
.burger{display:none;flex-direction:column;justify-content:center;gap:5px;cursor:pointer;padding:8px;background:none;border:none;flex-shrink:0;}
.burger span{display:block;width:22px;height:2px;background:var(--c-text);border-radius:2px;transition:transform .2s,opacity .2s;}
.burger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px);}
.burger.open span:nth-child(2){opacity:0;}
.burger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px);}
.mobile-menu{display:none;position:fixed;top:64px;left:0;right:0;background:rgba(250,240,246,0.98);backdrop-filter:blur(14px);border-bottom:1px solid var(--c-border);padding:1rem 1.5rem 1.5rem;z-index:99;flex-direction:column;gap:0;box-shadow:0 4px 20px rgba(124,111,247,0.1);}
.mobile-menu.open{display:flex!important;}
.mobile-menu a{display:block;padding:0.9rem 0;font-size:0.95rem;font-weight:600;color:var(--c-text2);text-decoration:none;border-bottom:1px solid var(--c-border);}
.mobile-menu a:last-child{border-bottom:none;}
.mobile-menu a:hover{color:var(--c-purple);}
.mob-cta-wrap{display:flex;flex-direction:column;gap:0.75rem;margin-top:1rem;}
.mob-btn-primary{background:var(--c-purple);color:white;border-radius:10px;padding:0.85rem;text-align:center;font-weight:700;font-size:0.95rem;text-decoration:none;display:block;}
.mob-btn-secondary{background:white;color:#1E1A3C;border-radius:10px;padding:0.75rem;text-align:center;font-weight:600;font-size:0.95rem;border:1.5px solid #D8CEFB;text-decoration:none;display:block;}
.cookie-banner{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);z-index:9999;background:#fff;border:1.5px solid #D8CEFB;border-radius:16px;box-shadow:0 8px 32px rgba(124,111,247,0.18);padding:1.25rem 1.5rem;max-width:520px;width:calc(100% - 2rem);display:flex;align-items:center;gap:1.25rem;animation:slideUp .35s ease;}
@keyframes slideUp{from{transform:translateX(-50%) translateY(20px);opacity:0;}to{transform:translateX(-50%) translateY(0);opacity:1;}}
.cookie-banner.hidden{display:none;}
.cookie-text{font-size:0.82rem;color:#5A5478;line-height:1.55;flex:1;}
.cookie-text a{color:#7C6FF7;font-weight:600;}
.cookie-btns{display:flex;gap:0.5rem;flex-shrink:0;}
.cookie-accept{background:#7C6FF7;color:#fff;border:none;border-radius:8px;padding:0.5rem 1.1rem;font-size:0.82rem;font-weight:700;cursor:pointer;white-space:nowrap;}
.cookie-decline{background:#F3EFF9;color:#5A5478;border:1px solid #D8CEFB;border-radius:8px;padding:0.5rem 0.9rem;font-size:0.82rem;font-weight:600;cursor:pointer;white-space:nowrap;}
@media (max-width:768px){.nav-links{display:none!important;}.nav-right{display:none!important;}.burger{display:flex!important;}.nav-inner{padding:0 1rem!important;}.nav-logo-text{font-size:0.875rem;}.cookie-banner{flex-direction:column;align-items:flex-start;}.cookie-btns{width:100%;}.cookie-accept,.cookie-decline{flex:1;text-align:center;}}
</style>
</head>
<body>

<nav><div class="nav-inner"><a href="index.html" class="nav-logo" style="display:flex;align-items:center;gap:8px;text-decoration:none;white-space:nowrap;flex-shrink:0;"><svg width="32" height="32" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0"><circle cx="22" cy="22" r="20" fill="#EDE9FE"/><circle cx="22" cy="22" r="14" fill="#7C6FF7"/><circle cx="22" cy="22" r="8" fill="#5BC4C0"/><circle cx="22" cy="22" r="3" fill="white"/></svg><span class="nav-logo-text">SalesHub Cloud</span></a><ul class="nav-links"><li><a href="index.html">Features</a></li><li><a href="index.html#pricing">Pricing</a></li><li><a href="index.html#platform">Platform</a></li><li><a href="index.html#faq">FAQ</a></li><li><a href="blog.html" class="active">Blog</a></li><li><a href="contact.html">Contact</a></li></ul><div class="nav-right"><button class="btn-ghost" onclick="openDemo()">Book a demo</button><button class="btn-nav" onclick="openTrial()">Start free trial</button></div><button class="burger" id="burgerBtn" aria-label="Open menu"><span></span><span></span><span></span></button></div></nav>
<div class="cookie-banner" id="cookieBanner"><div class="cookie-text">We use cookies to improve your experience and analyse site usage. See our <a href="cookies.html">Cookie Policy</a> for details.</div><div class="cookie-btns"><button class="cookie-accept" onclick="cookieConsent(&quot;accept&quot;)">Accept all</button><button class="cookie-decline" onclick="cookieConsent(&quot;decline&quot;)">Decline</button></div></div>
<script>(function(){var btn=document.getElementById("burgerBtn");var menu=document.getElementById("mobileMenu");if(!btn||!menu)return;btn.addEventListener("click",function(){btn.classList.toggle("open");menu.classList.toggle("open");});menu.querySelectorAll("a").forEach(function(a){a.addEventListener("click",function(){btn.classList.remove("open");menu.classList.remove("open");});});})();</script>
