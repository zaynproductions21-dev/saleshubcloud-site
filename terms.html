<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --c-purple:#0BAEAB;--c-purple-light:#E6F7F7;--c-purple-dark:#099C99;
  --c-teal:#5BC4C0;--c-teal-light:#E0F5F4;
  --c-bg:#F4F5FA;--c-bg2:#EEEFF4;--c-white:#FFFFFF;
  --c-border:#E6E6E8;--c-border2:#D5D5DA;
  --c-text:#2F2B3D;--c-text2:#444050;--c-text3:#8A8D93;
  --ff:'Public Sans',sans-serif;
}
[data-theme="dark"]{
  --c-bg:#28243D;--c-bg2:#312D4B;--c-white:#312D4B;--c-surface:#3D3759;
  --c-border:#4A4458;--c-border2:#534D6C;
  --c-text:#E7E3FC;--c-text2:#B4B0CC;--c-text3:#7F7B98;
  --c-purple-light:rgba(11,174,171,0.16);
  --c-teal-light:rgba(91,196,192,0.16);
  --c-coral-light:rgba(244,150,126,0.16);
  --c-green-light:rgba(86,202,0,0.16);
  --c-amber-light:rgba(255,180,0,0.16);
  --c-info-light:rgba(22,177,255,0.16);
  --c-danger-light:rgba(255,76,81,0.16);
  --c-indigo-light:rgba(105,108,255,0.16);
  --shadow:0 1px 4px rgba(15,12,30,0.30),0 4px 20px rgba(15,12,30,0.20);
  --shadow-md:0 4px 12px rgba(15,12,30,0.40),0 16px 48px rgba(15,12,30,0.30);
}
[data-theme="dark"] nav{background:rgba(40,36,61,0.93);}
[data-theme="dark"] footer{background:#312D4B;}
[data-theme="dark"] .modal-overlay{background:rgba(15,12,30,0.65);}
[data-theme="dark"] .stripe-badge{background:#FFFFFF;}
html,body{transition:background-color .25s ease,color .25s ease;}
.theme-toggle{width:38px;height:38px;border-radius:8px;border:1px solid var(--c-border2);background:var(--c-white);color:var(--c-text2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .15s,color .15s,background .15s;padding:0;flex-shrink:0;}
.theme-toggle:hover{border-color:var(--c-purple);color:var(--c-purple);}
.theme-toggle .material-symbols-rounded{font-size:20px;}
.theme-toggle-fixed{position:fixed;top:1rem;right:1rem;z-index:300;box-shadow:0 4px 12px rgba(58,53,65,0.15);}

html{scroll-behavior:smooth}
body{background:var(--c-bg);color:var(--c-text);font-family:var(--ff);font-size:16px;line-height:1.7;overflow-x:hidden;}
a{color:var(--c-purple);text-decoration:none;}
a:hover{text-decoration:underline;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(244,245,250,0.93);backdrop-filter:blur(14px);border-bottom:1px solid var(--c-border);}
.nav-inner{max-width:1160px;margin:0 auto;padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{font-size:1.1rem;font-weight:600;color:var(--c-text);letter-spacing:-0.03em;display:flex;align-items:center;gap:0.5rem;text-decoration:none;}
.nav-logo-mark{width:32px;height:32px;border-radius:6px;background:var(--c-purple);display:flex;align-items:center;justify-content:center;color:#fff;font-size:0.85rem;font-weight:600;}
.nav-back{font-size:0.875rem;color:var(--c-text2);font-weight:500;display:flex;align-items:center;gap:0.4rem;text-decoration:none;}
.nav-back:hover{color:var(--c-purple);}
.legal-hero{padding:8rem 2rem 3rem;background:linear-gradient(160deg,#EEEFF4,#F4F5FA);}
.legal-hero-inner{max-width:760px;margin:0 auto;}
.legal-tag{display:inline-flex;align-items:center;background:var(--c-purple-light);color:var(--c-purple);border-radius:100px;padding:0.3rem 0.9rem;font-size:0.78rem;font-weight:500;margin-bottom:1.25rem;letter-spacing:0.03em;}
.legal-h1{font-size:2.5rem;font-weight:600;letter-spacing:-0.04em;line-height:1.1;margin-bottom:0.75rem;}
.legal-meta{font-size:0.85rem;color:var(--c-text3);font-weight:500;}
.legal-meta strong{color:var(--c-text2);}
.legal-body{background:var(--c-white);border-top:1px solid var(--c-border);}
.legal-body-inner{max-width:760px;margin:0 auto;padding:3rem 2rem 5rem;}
.toc{background:var(--c-bg2);border:1px solid var(--c-border);border-radius:10px;padding:1.5rem 2rem;margin-bottom:3rem;}
.toc-title{font-size:0.8rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--c-text3);margin-bottom:1rem;}
.toc ol{padding-left:1.25rem;display:flex;flex-direction:column;gap:0.4rem;}
.toc li{font-size:0.875rem;color:var(--c-text2);}
.toc a{color:var(--c-purple);font-weight:500;}
h2{font-size:1.4rem;font-weight:600;letter-spacing:-0.02em;margin:2.5rem 0 0.75rem;color:var(--c-text);}
h3{font-size:1.05rem;font-weight:500;margin:1.5rem 0 0.5rem;color:var(--c-text);}
p{margin-bottom:1rem;color:var(--c-text2);font-size:0.95rem;line-height:1.75;}
ul,ol{margin:0.5rem 0 1rem 1.5rem;display:flex;flex-direction:column;gap:0.4rem;}
li{color:var(--c-text2);font-size:0.95rem;line-height:1.65;}
.divider{height:1px;background:var(--c-border);margin:2.5rem 0;}
.highlight-box{background:var(--c-purple-light);border:1px solid rgba(58,53,65,0.2);border-radius:12px;padding:1.25rem 1.5rem;margin:1.5rem 0;}
.highlight-box p{color:var(--c-purple);margin:0;font-size:0.9rem;}
.warn-box{background:#FEF3DC;border:1px solid rgba(247,185,85,0.3);border-radius:12px;padding:1.25rem 1.5rem;margin:1.5rem 0;}
.warn-box p{color:#92600A;margin:0;font-size:0.9rem;}







/* ── FOOTER FULL ── */
footer{background:var(--c-white);border-top:1px solid var(--c-border);padding:3rem 2rem 2rem;}
.footer-inner{max-width:1160px;margin:0 auto;}
.footer-top{display:grid;grid-template-columns:280px 1fr;gap:4rem;margin-bottom:2.5rem;}
@media(max-width:860px){.footer-top{grid-template-columns:1fr;gap:2rem;}}
.footer-logo-row{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.75rem;}
.footer-logo-mark{width:32px;height:32px;border-radius:6px;background:var(--c-purple);display:flex;align-items:center;justify-content:center;color:#fff;font-size:0.85rem;font-weight:600;flex-shrink:0;}
.footer-logo-text{font-size:1rem;font-weight:600;color:var(--c-text);letter-spacing:-0.02em;}
.footer-tagline{font-size:0.825rem;color:var(--c-text3);line-height:1.6;margin-bottom:1.25rem;}
.footer-social{display:flex;gap:0.5rem;flex-wrap:wrap;}
.social-btn{width:34px;height:34px;border-radius:8px;background:var(--c-bg2);border:1px solid var(--c-border);display:flex;align-items:center;justify-content:center;color:var(--c-text3);transition:background .15s,color .15s,border-color .15s;}
.social-btn:hover{background:var(--c-purple-light);color:var(--c-purple);border-color:var(--c-border2);}
.footer-nav-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:2rem;}
@media(max-width:580px){.footer-nav-cols{grid-template-columns:1fr 1fr;}}
.footer-col{display:flex;flex-direction:column;gap:0.5rem;}
.footer-col-title{font-size:0.72rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--c-text3);margin-bottom:0.25rem;}
.footer-col a{font-size:0.85rem;color:var(--c-text2);font-weight:500;transition:color .15s;}
.footer-col a:hover{color:var(--c-purple);}
.footer-bottom{border-top:1px solid var(--c-border);padding-top:1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
.footer-copy{font-size:0.78rem;color:var(--c-text3);}
.footer-payment{display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;}
.footer-payment-label{font-size:0.72rem;color:var(--c-text3);font-weight:600;letter-spacing:0.04em;text-transform:uppercase;margin-right:0.25rem;}
.payment-badge{display:inline-flex;align-items:center;justify-content:center;border-radius:5px;overflow:hidden;border:1px solid var(--c-border);background:var(--c-white);padding:2px 4px;height:26px;}
.stripe-badge{padding:3px 8px;background:#f6f9fc;}
.stripe-badge svg{height:16px;width:auto;}


.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;white-space:nowrap;flex-shrink:0;}
.nav-logo-text{font-size:1rem;font-weight:600;color:#2F2B3D;letter-spacing:-0.02em;white-space:nowrap;}
.burger{display:none;flex-direction:column;justify-content:center;gap:5px;cursor:pointer;padding:8px;background:none;border:none;flex-shrink:0;}
.burger span{display:block;width:22px;height:2px;background:var(--c-text);border-radius:2px;transition:transform .2s,opacity .2s;}
.burger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px);}
.burger.open span:nth-child(2){opacity:0;}
.burger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px);}
.mobile-menu{display:none;position:fixed;top:64px;left:0;right:0;background:rgba(244,245,250,0.98);backdrop-filter:blur(14px);border-bottom:1px solid var(--c-border);padding:1rem 1.5rem 1.5rem;z-index:99;flex-direction:column;gap:0;box-shadow:0 4px 20px rgba(58,53,65,0.1);}
.mobile-menu.open{display:flex!important;}
.mobile-menu a{display:block;padding:0.9rem 0;font-size:0.95rem;font-weight:600;color:var(--c-text2);text-decoration:none;border-bottom:1px solid var(--c-border);}
.mobile-menu a:last-child{border-bottom:none;}
.mobile-menu a:hover{color:var(--c-purple);}
.mob-cta-wrap{display:flex;flex-direction:column;gap:0.75rem;margin-top:1rem;}
.mob-btn-primary{background:var(--c-purple);color:white;border-radius:10px;padding:0.85rem;text-align:center;font-weight:500;font-size:0.95rem;text-decoration:none;display:block;}
.mob-btn-secondary{background:white;color:#2F2B3D;border-radius:10px;padding:0.75rem;text-align:center;font-weight:600;font-size:0.95rem;border:1.5px solid #D5D5DA;text-decoration:none;display:block;}
.cookie-banner{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);z-index:9999;background:#fff;border:1.5px solid #D5D5DA;border-radius:16px;box-shadow:0 8px 32px rgba(58,53,65,0.18);padding:1.25rem 1.5rem;max-width:520px;width:calc(100% - 2rem);display:flex;align-items:center;gap:1.25rem;animation:slideUp .35s ease;}
@keyframes slideUp{from{transform:translateX(-50%) translateY(20px);opacity:0;}to{transform:translateX(-50%) translateY(0);opacity:1;}}
.cookie-banner.hidden{display:none;}
.cookie-text{font-size:0.82rem;color:#444050;line-height:1.55;flex:1;}
.cookie-text a{color:#0BAEAB;font-weight:600;}
.cookie-btns{display:flex;gap:0.5rem;flex-shrink:0;}
.cookie-accept{background:#0BAEAB;color:#fff;border:none;border-radius:8px;padding:0.5rem 1.1rem;font-size:0.82rem;font-weight:500;cursor:pointer;white-space:nowrap;}
.cookie-decline{background:#EEEFF4;color:#444050;border:1px solid #D5D5DA;border-radius:8px;padding:0.5rem 0.9rem;font-size:0.82rem;font-weight:600;cursor:pointer;white-space:nowrap;}
@media (max-width:768px){.nav-links{display:none!important;}.nav-right{display:none!important;}.burger{display:flex!important;}.nav-inner{padding:0 1rem!important;}.nav-logo-text{font-size:0.875rem;}.cookie-banner{flex-direction:column;align-items:flex-start;}.cookie-btns{width:100%;}.cookie-accept,.cookie-decline{flex:1;text-align:center;}}
</style>
