name: Nightly Backup

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create nightly backup tag
        run: |
          DATE=$(date +'%Y-%m-%d')
          git config user.name "PublishOS Backup"
          git config user.email "backup@zaynit.com"
          git tag -a "backup-$DATE" -m "Nightly backup $DATE" 2>/dev/null || echo "Tag exists"
          git push origin "backup-$DATE" 2>/dev/null || echo "Tag already pushed"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
